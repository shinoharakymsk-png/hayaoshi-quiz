<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>早押しクイズ</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="/socket.io/socket.io.js"></script>
    <style>
        /* ここにあなたの好きなデザインを書けます */
        body { 
            text-align: center; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: #ffffff; 
            color: #333;
            margin-top: 50px;
        }
        #status { 
            font-size: 1.5rem; 
            margin-bottom: 30px; 
            min-height: 1.5em;
        }
        #btn { 
            width: 200px; height: 200px; 
            background-color: #ff4b00; 
            color: white; 
            border: none; 
            border-radius: 50%; 
            font-size: 2rem; 
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px #c93a00;
        }
        #btn:active { 
            box-shadow: none; 
            transform: translateY(5px); 
        }
        #btn:disabled { 
            background-color: #ccc; 
            box-shadow: none; 
        }
        #reset-btn { 
            margin-top: 60px; 
            padding: 10px 20px; 
            background: #eee; 
            border: 1px solid #ccc; 
            border-radius: 5px; 
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="status">準備はいいですか？</div>
    
    <!-- ボタンの文字を日本語に -->
    <button id="btn">押す！</button>
    
    <br>
    <button id="reset-btn">次の問題へ（リセット）</button>

    <script>
        const socket = io();
        const btn = document.getElementById('btn');
        const status = document.getElementById('status');
        const resetBtn = document.getElementById('reset-btn');

        // 名前を日本語にする
        const myName = "回答者" + Math.floor(Math.random() * 100);

        btn.addEventListener('click', () => {
            socket.emit('push', myName);
        });

        resetBtn.addEventListener('click', () => {
            socket.emit('reset');
        });

        socket.on('winner', (name) => {
            status.innerText = "★ " + name + " さんが正解！";
            status.style.color = "red";
            btn.disabled = true;
        });

        socket.on('reset', () => {
            status.innerText = "問題です！";
            status.style.color = "#333";
            btn.disabled = false;
        });
    </script>
</body>
</html>
