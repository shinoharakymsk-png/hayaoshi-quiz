<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>早押しボタン</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { text-align: center; font-family: sans-serif; background: #f0f0f0; }
    #status { font-size: 24px; margin-top: 20px; color: #333; font-weight: bold; }
    #btn { 
      width: 250px; height: 250px; border-radius: 50%; 
      background: red; color: white; font-size: 40px; font-weight: bold;
      border: 10px solid #a00; cursor: pointer; box-shadow: 0 10px #600;
      margin-top: 50px; outline: none;
    }
    #btn:active { box-shadow: 0 0; transform: translateY(10px); }
    #btn:disabled { background: #888; border-color: #555; box-shadow: none; cursor: default; }
    #reset-btn { margin-top: 50px; padding: 10px 20px; font-size: 18px; }
  </style>
</head>
<body>

  <div id="status">ボタンを押してください！</div>
  <button id="btn">PUSH!</button>
  <br>
  <button id="reset-btn">リセット</button>

  <script>
    const socket = io();
    const btn = document.getElementById('btn');
    const status = document.getElementById('status');
    const resetBtn = document.getElementById('reset-btn');

    // 自分の名前を決める（適当に作成）
    const myName = "プレイヤー" + Math.floor(Math.random() * 100);

    btn.addEventListener('click', () => {
      socket.emit('push', myName);
    });

    resetBtn.addEventListener('click', () => {
      socket.emit('reset');
    });

    socket.on('winner', (name) => {
      status.innerText = name + " さんが押しました！";
      status.style.color = "red";
      btn.disabled = true;
    });

    socket.on('reset', () => {
      status.innerText = "ボタンを押してください！";
      status.style.color = "#333";
      btn.disabled = false;
    });
  </script>
</body>
</html>
